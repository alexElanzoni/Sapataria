<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordem de Serviço - Sapataria</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Mesmo estilo anterior, mas reforçando a tabela */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }
        .btn-add-item { margin: 10px 0; }
        .item-edicao {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }
        .item-edicao .campo-label {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 0.8rem;
            color: #555;
        }
        .tabela-os {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .tabela-os th, .tabela-os td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        .tabela-os th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .tabela-os .acoes {
            white-space: nowrap;
        }
        /* Responsividade para telas pequenas, mas mantém legível */
        @media (max-width: 768px) {
            .tabela-os, .tabela-os thead, .tabela-os tbody, .tabela-os th, .tabela-os td, .tabela-os tr {
                display: block;
            }
            .tabela-os thead tr { display: none; }
            .tabela-os tr { border: 1px solid #ccc; margin-bottom: 10px; }
            .tabela-os td { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
            .tabela-os td::before { content: attr(data-label); font-weight: bold; width: 40%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 Ordem de Serviço</h1>
        <div class="nav-menu">
            <a href="index.html">🏠 Início</a>
            <a href="clientes.html">👥 Clientes</a>
            <a href="ordem-servico.html">📝 OS</a>
            <a href="painel-dia.html">📅 Painel</a>
            <a href="caixa.html">💰 Caixa</a>
            <a href="estoque.html">📦 Estoque</a>
            <a href="relatorios.html">📊 Relatórios</a>
        </div>
    </div>
    <div class="content">
        <div style="margin-bottom: 20px;">
            <button id="btn-nova-os" class="btn btn-primary">➕ Nova Ordem de Serviço</button>
        </div>
        <div class="card">
            <h2 class="card-title">📋 Ordens de Serviço</h2>
            <div id="lista-os">Carregando...</div>
        </div>
    </div>
</div>

<!-- MODAL PARA CRIAR NOVA OS (similar ao de edição em estrutura) -->
<div id="modal-nova-os" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>🆕 Nova Ordem de Serviço</h3>
            <button class="fechar-modal" data-modal="modal-nova-os" class="btn btn-secondary">&times;</button>
        </div>
        <form id="form-nova-os">
            <div class="form-group">
                <label>Cliente</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="busca-cliente" placeholder="Buscar por nome/telefone" style="flex:1">
                    <button type="button" id="btn-buscar-cliente" class="btn btn-secondary">Buscar</button>
                    <button type="button" id="btn-novo-cliente-modal" class="btn btn-primary">+ Novo</button>
                </div>
                <div id="cliente-selecionado" style="display:none; margin-top:5px; background:#e8f8f5; padding:5px;">
                    <span id="cliente-nome"></span> - <span id="cliente-telefone"></span>
                    <input type="hidden" id="cliente-id">
                </div>
            </div>
            <div id="itens-container">
                <div class="item-edicao" data-index="0">
                    <div class="campo-label">Tipo do objeto</div>
                    <div class="row">
                        <div class="col"><select class="tipo-item" required>
                            <option value="sapato">Sapato</option>
                            <option value="bota">Bota</option>
                            <option value="bolsa">Bolsa</option>
                            <option value="mala">Mala</option>
                            <option value="mochila">Mochila</option>
                            <option value="outro">Outro</option>
                        </select></div>
                        <div class="col"><div class="campo-label">Quantidade</div><input type="number" class="quantidade-item" min="1" value="1" required></div>
                        <div class="col"><div class="campo-label">Valor (R$)</div><input type="number" class="valor-item" step="0.01" placeholder="0,00" required></div>
                    </div>
                    <div class="outro-container" style="display:none;"><div class="campo-label">Descreva o objeto</div><input type="text" class="outro-texto" placeholder="Ex: cinto, carteira"></div>
                    <div class="campo-label">Características (cor, marca, defeitos)</div>
                    <textarea class="caracteristicas-item" rows="1" placeholder="Ex: Couro marrom, fivelas"></textarea>
                    <div class="campo-label">Serviço a realizar</div>
                    <textarea class="servico-item" rows="2" placeholder="Descreva o serviço" required></textarea>
                    <button type="button" class="btn-remover-item" style="display:none;">❌ Remover item</button>
                </div>
            </div>
            <button type="button" id="add-item" class="btn btn-secondary btn-add-item">+ Adicionar outro item</button>
            <div class="row" style="margin-top:15px;">
                <div class="col"><label>Data entrada</label><input type="date" id="data-entrada"></div>
                <div class="col"><label>Data retirada *</label><input type="date" id="data-retirada" required></div>
            </div>
            <div class="form-group"><label>Valor total: R$ <span id="total-os">0,00</span></label></div>
            <div class="modal-buttons">
                <button type="button" class="btn btn-secondary fechar-modal" data-modal="modal-nova-os">Cancelar</button>
                <button type="submit" class="btn btn-success">Salvar OS e Imprimir</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL PARA EDIÇÃO DE OS (com labels organizados) -->
<div id="modal-edicao" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>✏️ Editar OS: <span id="edit-os-id"></span></h3>
            <button class="fechar-modal" data-modal="modal-edicao" class="btn btn-secondary">&times;</button>
        </div>
        <div id="edit-conteudo"></div>
        <div class="modal-buttons">
            <button class="btn btn-secondary fechar-modal" data-modal="modal-edicao">Cancelar</button>
            <button id="salvar-edicao" class="btn btn-success">Salvar alterações</button>
        </div>
    </div>
</div>

<!-- MODAL NOVO CLIENTE -->
<div id="modal-novo-cliente" class="modal">
    <div class="modal-content">
        <h3>Novo Cliente</h3>
        <input type="text" id="novo-nome" placeholder="Nome"><br>
        <input type="text" id="novo-telefone" placeholder="Telefone"><br>
        <input type="text" id="novo-endereco" placeholder="Endereço"><br>
        <div class="modal-buttons">
            <button class="btn btn-secondary fechar-modal" data-modal="modal-novo-cliente">Cancelar</button>
            <button id="salvar-novo-cliente" class="btn btn-primary">Salvar</button>
        </div>
    </div>
</div>

<script src="storage.js"></script>
<script>
    // ==================== FUNÇÕES GERAIS ====================
    function escapeHtml(t) { if(!t) return ''; return t.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
    document.querySelectorAll('.fechar-modal').forEach(btn => {
        btn.addEventListener('click', () => {
            const modalId = btn.getAttribute('data-modal');
            if(modalId) fecharModal(modalId);
        });
    });
    window.onclick = e => { if(e.target.classList?.contains('modal')) e.target.style.display = 'none'; };

    // ==================== CRIAÇÃO DE NOVA OS ====================
    let clienteSelecionado = null;
    const formNova = document.getElementById('form-nova-os');
    const itensContainer = document.getElementById('itens-container');
    const addItemBtn = document.getElementById('add-item');
    const totalSpan = document.getElementById('total-os');
    const dataEntrada = document.getElementById('data-entrada');
    const dataRetirada = document.getElementById('data-retirada');
    dataEntrada.value = new Date().toISOString().slice(0,10);

    function atualizarTotal() {
        let total = 0;
        document.querySelectorAll('#itens-container .valor-item').forEach(inp => { let v=parseFloat(inp.value); if(!isNaN(v)) total+=v; });
        totalSpan.innerText = total.toFixed(2);
    }

    function criarItemDiv(idx, data={}) {
        const div = document.createElement('div');
        div.className = 'item-edicao';
        div.innerHTML = `
            <div class="campo-label">Tipo do objeto</div>
            <div class="row">
                <div class="col"><select class="tipo-item">${document.querySelector('#itens-container .tipo-item').innerHTML}</select></div>
                <div class="col"><div class="campo-label">Quantidade</div><input type="number" class="quantidade-item" min="1" value="${data.quantidade || 1}" required></div>
                <div class="col"><div class="campo-label">Valor (R$)</div><input type="number" class="valor-item" step="0.01" value="${data.valorItem || ''}" required></div>
            </div>
            <div class="outro-container" style="display:none;"><div class="campo-label">Descreva o objeto</div><input type="text" class="outro-texto" value="${escapeHtml(data.tipoPersonalizado || '')}" placeholder="Ex: cinto, carteira"></div>
            <div class="campo-label">Características (cor, marca, defeitos)</div>
            <textarea class="caracteristicas-item" rows="1" placeholder="Ex: Couro marrom, fivelas">${escapeHtml(data.caracteristicas || '')}</textarea>
            <div class="campo-label">Serviço a realizar</div>
            <textarea class="servico-item" rows="2" placeholder="Descreva o serviço" required>${escapeHtml(data.servicoItem || '')}</textarea>
            <button type="button" class="btn-remover-item">❌ Remover item</button>
        `;
        const tipoSelect = div.querySelector('.tipo-item');
        if(data.tipoObjeto) tipoSelect.value = data.tipoObjeto;
        div.querySelector('.outro-container').style.display = tipoSelect.value === 'outro' ? 'block' : 'none';
        tipoSelect.addEventListener('change', () => {
            div.querySelector('.outro-container').style.display = tipoSelect.value === 'outro' ? 'block' : 'none';
        });
        div.querySelector('.valor-item').addEventListener('input', atualizarTotal);
        div.querySelector('.btn-remover-item').addEventListener('click', () => { div.remove(); atualizarTotal(); });
        return div;
    }

    addItemBtn.addEventListener('click', () => {
        itensContainer.appendChild(criarItemDiv(itensContainer.children.length, {}));
        atualizarTotal();
    });

    // Cliente
    document.getElementById('btn-buscar-cliente').addEventListener('click', () => {
        const termo = document.getElementById('busca-cliente').value.trim();
        if(!termo) return;
        const res = buscarClientes(termo);
        if(res.length===0) alert('Nenhum cliente');
        else if(res.length===1) selecionarCliente(res[0]);
        else {
            let msg = 'Clientes:\n';
            res.forEach((c,i)=>msg+=`${i+1} - ${c.nome} (${c.telefone})\n`);
            const opt = prompt(msg+'Número:');
            const idx = parseInt(opt)-1;
            if(res[idx]) selecionarCliente(res[idx]);
        }
    });
    function selecionarCliente(c) {
        clienteSelecionado = c;
        document.getElementById('cliente-id').value = c.id;
        document.getElementById('cliente-nome').innerText = c.nome;
        document.getElementById('cliente-telefone').innerText = c.telefone;
        document.getElementById('cliente-selecionado').style.display = 'block';
    }

    // Modal novo cliente
    const modalNovoCliente = document.getElementById('modal-novo-cliente');
    document.getElementById('btn-novo-cliente-modal').addEventListener('click', () => abrirModal('modal-novo-cliente'));
    document.getElementById('salvar-novo-cliente').addEventListener('click', () => {
        const nome = document.getElementById('novo-nome').value.trim();
        const telefone = document.getElementById('novo-telefone').value.trim();
        if(!nome || !telefone) { alert('Nome e telefone obrigatórios'); return; }
        const endereco = document.getElementById('novo-endereco').value;
        const novo = adicionarCliente({ nome, telefone, endereco });
        selecionarCliente(novo);
        fecharModal('modal-novo-cliente');
        document.getElementById('novo-nome').value = '';
        document.getElementById('novo-telefone').value = '';
        document.getElementById('novo-endereco').value = '';
    });

    formNova.addEventListener('submit', (e) => {
        e.preventDefault();
        if(!clienteSelecionado) { alert('Selecione um cliente'); return; }
        const itens = [];
        let ok = true;
        document.querySelectorAll('#itens-container .item-edicao').forEach(div => {
            const tipo = div.querySelector('.tipo-item').value;
            const quantidade = parseInt(div.querySelector('.quantidade-item').value);
            const valorItem = parseFloat(div.querySelector('.valor-item').value);
            const caracteristicas = div.querySelector('.caracteristicas-item').value;
            const servicoItem = div.querySelector('.servico-item').value.trim();
            let tipoPersonalizado = '';
            if(tipo === 'outro') {
                tipoPersonalizado = div.querySelector('.outro-texto').value.trim();
                if(!tipoPersonalizado) ok=false;
            }
            if(isNaN(quantidade)||quantidade<1) ok=false;
            if(isNaN(valorItem)||valorItem<=0) ok=false;
            if(!servicoItem) ok=false;
            itens.push({ tipoObjeto: tipo, tipoPersonalizado, quantidade, valorItem, caracteristicas, servicoItem, status: 'ativo' });
        });
        if(!ok || itens.length===0) { alert('Preencha todos os itens'); return; }
        const dataRet = dataRetirada.value;
        if(!dataRet) { alert('Data retirada obrigatória'); return; }
        const nova = adicionarOrdem({
            clienteId: clienteSelecionado.id,
            itens: itens,
            dataEntrada: new Date(dataEntrada.value).toISOString(),
            dataRetirada: new Date(dataRet).toISOString()
        });
        alert(`OS ${nova.id} criada!`);
        window.open(`cupom.html?id=${nova.id}`, '_blank');
        fecharModal('modal-nova-os');
        // Reset
        clienteSelecionado = null;
        document.getElementById('cliente-selecionado').style.display = 'none';
        document.getElementById('busca-cliente').value = '';
        while(itensContainer.children.length > 1) itensContainer.removeChild(itensContainer.lastChild);
        const firstItem = itensContainer.querySelector('.item-edicao');
        firstItem.querySelector('.valor-item').value = '';
        firstItem.querySelector('.servico-item').value = '';
        firstItem.querySelector('.caracteristicas-item').value = '';
        dataRetirada.value = '';
        atualizarTotal();
        carregarListagemOS();
    });

    // ==================== EDIÇÃO DE OS (com labels) ====================
    let currentEditOSId = null;

    function abrirModalEdicao(osId) {
        const ordens = getOrdens();
        const os = ordens.find(o => o.id === osId);
        if(!os) return;
        if(os.status !== 'em_andamento') { alert('Só é possível editar OS em andamento.'); return; }
        currentEditOSId = osId;
        document.getElementById('edit-os-id').innerText = osId;
        const container = document.getElementById('edit-conteudo');
        let html = `
            <div><strong>Cliente:</strong> ${escapeHtml(buscarClientePorId(os.clienteId)?.nome)} (não editável)</div>
            <div class="row"><div class="col"><label>Data entrada</label><input type="date" id="edit-data-entrada" value="${new Date(os.dataEntrada).toISOString().slice(0,10)}"></div>
            <div class="col"><label>Data retirada</label><input type="date" id="edit-data-retirada" value="${new Date(os.dataRetirada).toISOString().slice(0,10)}" required></div></div>
            <h4>Itens do serviço</h4>
            <div id="edit-itens-container"></div>
            <button type="button" id="edit-add-item" class="btn btn-secondary btn-add-item">+ Adicionar item</button>
            <div><label>Valor total: R$ <span id="edit-total">0,00</span></label></div>
        `;
        container.innerHTML = html;
        const itensEditContainer = document.getElementById('edit-itens-container');
        function renderizarItensEdit() {
            itensEditContainer.innerHTML = '';
            os.itens.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'item-edicao';
                div.innerHTML = `
                    <div class="campo-label">Tipo do objeto</div>
                    <div class="row">
                        <div class="col"><select class="edit-tipo" data-idx="${idx}">${document.querySelector('#itens-container .tipo-item').innerHTML}</select></div>
                        <div class="col"><div class="campo-label">Quantidade</div><input type="number" class="edit-quantidade" data-idx="${idx}" min="1" value="${item.quantidade}"></div>
                        <div class="col"><div class="campo-label">Valor (R$)</div><input type="number" class="edit-valor" data-idx="${idx}" step="0.01" value="${item.valorItem}"></div>
                    </div>
                    <div class="edit-outro-container" data-idx="${idx}" style="display:${item.tipoObjeto==='outro'?'block':'none'}"><div class="campo-label">Descreva o objeto</div><input type="text" class="edit-outro-texto" data-idx="${idx}" placeholder="Ex: cinto, carteira" value="${escapeHtml(item.tipoPersonalizado||'')}"></div>
                    <div class="campo-label">Características (cor, marca, defeitos)</div>
                    <textarea class="edit-caracteristicas" data-idx="${idx}" rows="1" placeholder="Ex: Couro marrom, fivelas">${escapeHtml(item.caracteristicas||'')}</textarea>
                    <div class="campo-label">Serviço a realizar</div>
                    <textarea class="edit-servico" data-idx="${idx}" rows="2" placeholder="Descreva o serviço" required>${escapeHtml(item.servicoItem||'')}</textarea>
                    <button type="button" class="btn-remover-item" data-idx="${idx}">❌ Remover item</button>
                `;
                const tipoSelect = div.querySelector('.edit-tipo');
                tipoSelect.value = item.tipoObjeto;
                tipoSelect.addEventListener('change', () => {
                    div.querySelector('.edit-outro-container').style.display = tipoSelect.value === 'outro' ? 'block' : 'none';
                });
                div.querySelector('.edit-quantidade').addEventListener('input', atualizarTotalEdit);
                div.querySelector('.edit-valor').addEventListener('input', atualizarTotalEdit);
                div.querySelector('.btn-remover-item').addEventListener('click', () => {
                    os.itens.splice(idx, 1);
                    renderizarItensEdit();
                });
                itensEditContainer.appendChild(div);
            });
            atualizarTotalEdit();
        }
        function atualizarTotalEdit() {
            let total = 0;
            document.querySelectorAll('.edit-valor').forEach(inp => { let v=parseFloat(inp.value); if(!isNaN(v)) total+=v; });
            document.getElementById('edit-total').innerText = total.toFixed(2);
        }
        renderizarItensEdit();
        document.getElementById('edit-add-item').onclick = () => {
            os.itens.push({ tipoObjeto:'sapato', tipoPersonalizado:'', quantidade:1, valorItem:0, caracteristicas:'', servicoItem:'', status:'ativo' });
            renderizarItensEdit();
        };
        const salvarBtn = document.getElementById('salvar-edicao');
        salvarBtn.onclick = () => {
            const novosItens = [];
            let ok = true;
            document.querySelectorAll('#edit-itens-container .item-edicao').forEach(div => {
                const tipo = div.querySelector('.edit-tipo').value;
                const quantidade = parseInt(div.querySelector('.edit-quantidade').value);
                const valorItem = parseFloat(div.querySelector('.edit-valor').value);
                const caracteristicas = div.querySelector('.edit-caracteristicas').value;
                const servicoItem = div.querySelector('.edit-servico').value.trim();
                let tipoPersonalizado = '';
                if(tipo === 'outro') {
                    tipoPersonalizado = div.querySelector('.edit-outro-texto').value.trim();
                    if(!tipoPersonalizado) ok=false;
                }
                if(isNaN(quantidade)||quantidade<1) ok=false;
                if(isNaN(valorItem)||valorItem<=0) ok=false;
                if(!servicoItem) ok=false;
                novosItens.push({ tipoObjeto: tipo, tipoPersonalizado, quantidade, valorItem, caracteristicas, servicoItem, status: 'ativo' });
            });
            if(!ok || novosItens.length===0) { alert('Preencha todos os itens'); return; }
            const novaDataRetirada = document.getElementById('edit-data-retirada').value;
            const novaDataEntrada = document.getElementById('edit-data-entrada').value;
            if(!novaDataRetirada) { alert('Data retirada obrigatória'); return; }
            const ordens = getOrdens();
            const index = ordens.findIndex(o => o.id === currentEditOSId);
            if(index !== -1) {
                ordens[index].itens = novosItens;
                ordens[index].valor = novosItens.reduce((s,i)=>s+i.valorItem,0);
                ordens[index].dataEntrada = new Date(novaDataEntrada).toISOString();
                ordens[index].dataRetirada = new Date(novaDataRetirada).toISOString();
                saveOrdens(ordens);
                alert('OS atualizada!');
                fecharModal('modal-edicao');
                carregarListagemOS();
            } else alert('Erro');
        };
        abrirModal('modal-edicao');
    }

    // ==================== LISTAGEM DE OS (tabela com data-label para responsividade) ====================
    function carregarListagemOS() {
        const ordens = getOrdens().slice(0, 30);
        const div = document.getElementById('lista-os');
        if(!ordens.length) { div.innerHTML = '<p>Nenhuma OS cadastrada.</p>'; return; }
        let html = '<table class="tabela-os"><thead><tr>';
        html += '<th>OS</th><th>Cliente</th><th>Itens</th><th>Valor</th><th>Status</th><th>Ações</th>';
        html += '</thead><tbody>';
        ordens.forEach(os => {
            const cliente = buscarClientePorId(os.clienteId);
            const resumo = os.itens.filter(i=>i.status!=='cancelado').map(i=>`${i.quantidade}x ${i.tipoObjeto==='outro'&&i.tipoPersonalizado?i.tipoPersonalizado:i.tipoObjeto}`).join(', ');
            const statusText = { em_andamento:'Em andamento', pronto:'Pronto', entregue:'Entregue', cancelada:'Cancelada' }[os.status];
            html += `<tr>
                        <td data-label="OS">${os.id}</td>
                        <td data-label="Cliente">${cliente?.nome||'?'}</td>
                        <td data-label="Itens">${resumo.substring(0,60)}</td>
                        <td data-label="Valor">R$ ${os.valor.toFixed(2)}</td>
                        <td data-label="Status">${statusText}</td>
                        <td data-label="Ações" class="acoes">
                            ${os.status === 'em_andamento' ? `<button class="btn-editar" data-id="${os.id}">✏️ Editar</button>` : ''}
                            <button class="btn-cupom" data-id="${os.id}">🖨️ Cupom</button>
                        </td>
                     </tr>`;
        });
        html += '</tbody></table>';
        div.innerHTML = html;
        document.querySelectorAll('.btn-editar').forEach(btn => btn.addEventListener('click', () => abrirModalEdicao(btn.getAttribute('data-id'))));
        document.querySelectorAll('.btn-cupom').forEach(btn => btn.addEventListener('click', () => window.open(`cupom.html?id=${btn.getAttribute('data-id')}`, '_blank')));
    }

    // ==================== VERIFICAR PARÂMETRO EDIT NA URL ====================
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    const editId = getUrlParameter('edit');
    if(editId) {
        setTimeout(() => {
            const ordens = getOrdens();
            const existe = ordens.some(o => o.id === editId);
            if(existe) abrirModalEdicao(editId);
            else alert(`OS ${editId} não encontrada`);
        }, 500);
    }

    // Inicializar
    carregarListagemOS();
    function ajustarBotoesRemover() {
        const itens = document.querySelectorAll('#itens-container .item-edicao');
        itens.forEach(item => { const btn = item.querySelector('.btn-remover-item'); if(btn) btn.style.display = itens.length > 1 ? 'inline-block' : 'none'; });
    }
    const observer = new MutationObserver(ajustarBotoesRemover);
    observer.observe(itensContainer, { childList: true, subtree: true });
    ajustarBotoesRemover();
    atualizarTotal();
    document.getElementById('btn-nova-os').addEventListener('click', () => abrirModal('modal-nova-os'));
</script>
</body>
</html>
